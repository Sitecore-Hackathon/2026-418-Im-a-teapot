name: Build and deploy ASP.Net Core app to an Azure Web App

env:
    AZURE_WEBAPP_NAME: coordinatorapi
    AZURE_WEBAPP_PACKAGE_PATH: "./out/api"
    DOTNET_VERSION: "10.0.x"

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Set up .NET Core
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Set up dependency caching for faster builds
              uses: actions/cache@v5
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget

            - name: Build with dotnet
              run: dotnet build --configuration Release ./coordinatorapi/src/CoordinatorApi/CoordinatorApi.csproj

            - name: dotnet publish
              run: dotnet publish -c Release -o ${{env.AZURE_WEBAPP_PACKAGE_PATH}} ./coordinatorapi/src/CoordinatorApi/CoordinatorApi.csproj

            - name: Upload artifact for deployment job
              uses: actions/upload-artifact@v6
              with:
                  name: app
                  path: ${{env.AZURE_WEBAPP_PACKAGE_PATH}}

    deploy:
        permissions:
            contents: none
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: "Development"
            url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

        steps:
            - name: Download artifact from build job
              uses: actions/download-artifact@v8
              with:
                  name: app

            - name: test
              run: ls -la

            - name: Deploy to Azure Web App
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v2
              with:
                  app-name: ${{ env.AZURE_WEBAPP_NAME }}
                  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
                  package: app
